<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KisanAI — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .auth-card {
      background: var(--surface); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg); border: 1px solid var(--border);
      width: 100%; max-width: 440px; overflow: hidden;
    }
    .auth-header {
      background: linear-gradient(135deg, var(--green-deep), #2e7d32);
      padding: 2.5rem 2rem; text-align: center; color: white;
    }
    .auth-header .logo { font-size: 3rem; margin-bottom: 0.5rem; }
    .auth-header h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 0.25rem; }
    .auth-header p { opacity: 0.8; font-size: 0.9rem; }
    .auth-body { padding: 2rem; }
    .tab-row { display: flex; gap: 0; margin-bottom: 1.5rem; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
    .tab-btn {
      flex: 1; padding: 0.65rem; border: none; background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: var(--transition); color: var(--text-muted);
    }
    .tab-btn.active { background: var(--green-mid); color: white; }
    .form-section { display: none; }
    .form-section.active { display: block; }
    .auth-footer { padding: 1rem 2rem; background: var(--surface2); text-align: center; font-size: 0.8rem; color: var(--text-muted); }
    .error-msg { background: #ffebee; color: var(--red); border-radius: 8px; padding: 0.65rem 1rem; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .success-msg { background: var(--green-pale); color: var(--green-deep); border-radius: 8px; padding: 0.65rem 1rem; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">🌱</div>
      <h1>KisanAI</h1>
      <p>Smart Agriculture Assistant</p>
    </div>

    <div class="auth-body">
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <div class="form-section active" id="loginSection">
        <div class="error-msg" id="loginError"></div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="aapka@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="Password daalo" />
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">Login karo</button>
        <div style="text-align:center; margin-top:1rem; font-size:0.85rem; color:var(--text-muted);">
          Demo ke liye: <strong>demo@kisan.ai</strong> / <strong>demo123</strong>
        </div>
      </div>

      <!-- SIGNUP -->
      <div class="form-section" id="signupSection">
        <div class="error-msg" id="signupError"></div>
        <div class="success-msg" id="signupSuccess"></div>
        <div class="form-group">
          <label class="form-label">Naam</label>
          <input type="text" class="form-control" id="signupName" placeholder="Aapka naam" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="signupEmail" placeholder="aapka@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="signupPassword" placeholder="Min 6 characters" />
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="doSignup()">Account banao</button>
      </div>
    </div>

    <div class="auth-footer">
      🌱 KisanAI — Farmers ke liye AI technology
    </div>
  </div>
</div>

<script>
  // Check if already logged in
  if (localStorage.getItem('kisanai_user')) {
    window.location.href = 'index.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='signup')));
    document.getElementById('loginSection').classList.toggle('active', tab === 'login');
    document.getElementById('signupSection').classList.toggle('active', tab === 'signup');
  }

  function showError(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  function doLogin() {
    var email = document.getElementById('loginEmail').value.trim();
    var pass  = document.getElementById('loginPassword').value;

    if (!email || !pass) { showError('loginError', 'Email aur password daalo'); return; }

    // Get users from localStorage
    var users = JSON.parse(localStorage.getItem('kisanai_users') || '[]');

    // Demo user
    if (email === 'demo@kisan.ai' && pass === 'demo123') {
      var demoUser = { id: 'demo', name: 'Demo Kisan', email: 'demo@kisan.ai' };
      localStorage.setItem('kisanai_user', JSON.stringify(demoUser));
      window.location.href = 'index.html';
      return;
    }

    var user = users.find(u => u.email === email && u.password === pass);
    if (!user) { showError('loginError', 'Email ya password galat hai'); return; }

    localStorage.setItem('kisanai_user', JSON.stringify({ id: user.id, name: user.name, email: user.email }));
    window.location.href = 'index.html';
  }

  function doSignup() {
    var name  = document.getElementById('signupName').value.trim();
    var email = document.getElementById('signupEmail').value.trim();
    var pass  = document.getElementById('signupPassword').value;

    if (!name || !email || !pass) { showError('signupError', 'Sab fields bharo'); return; }
    if (pass.length < 6) { showError('signupError', 'Password kam se kam 6 characters ka hona chahiye'); return; }

    var users = JSON.parse(localStorage.getItem('kisanai_users') || '[]');
    if (users.find(u => u.email === email)) { showError('signupError', 'Yeh email pehle se registered hai'); return; }

    var newUser = { id: Date.now().toString(), name, email, password: pass };
    users.push(newUser);
    localStorage.setItem('kisanai_users', JSON.stringify(users));

    var el = document.getElementById('signupSuccess');
    el.textContent = 'Account ban gaya! Ab login karo.';
    el.style.display = 'block';
    setTimeout(() => { switchTab('login'); el.style.display = 'none'; document.getElementById('loginEmail').value = email; }, 2000);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('loginSection').classList.contains('active')) doLogin();
      else doSignup();
    }
  });
</script>
</body>
</html>
